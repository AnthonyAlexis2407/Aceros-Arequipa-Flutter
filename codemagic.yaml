workflows:
  ios-workflow:
    name: Flutter iOS Build (unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # 1. Obtener dependencias de Flutter (también regenera Generated.xcconfig con rutas Mac)
      - name: Get Flutter packages
        script: |
          flutter pub get

      # 2. Verificar que Generated.xcconfig fue creado correctamente
      - name: Verify Generated.xcconfig
        script: |
          if [ ! -f "ios/Flutter/Generated.xcconfig" ]; then
            echo "ERROR: Generated.xcconfig no fue creado por flutter pub get"
            exit 1
          fi
          echo "Generated.xcconfig OK:"
          cat ios/Flutter/Generated.xcconfig

      # 3. Colocar el GoogleService-Info.plist desde variable secreta de Codemagic
      #    En Codemagic Dashboard → Environment variables → agregar GOOGLE_SERVICE_INFO_PLIST
      #    con el contenido del archivo en base64
      - name: Set up GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"

      # 4. Instalar pods de CocoaPods
      - name: Pod install
        script: |
          cd ios && pod install --repo-update

      # 5. Compilar iOS SIN firma (no se necesita Apple Developer Account)
      #    Genera el .app dentro de build/ios/iphoneos/
      - name: Build iOS (unsigned)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      # El .app sin firmar (para simulador o herramientas como AltStore)
      - build/ios/iphoneos/Runner.app
      # Logs de Xcode para depurar errores si el build falla
      - /tmp/xcodebuild_logs/*.log
      # También guarda el .xcarchive si está disponible
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      email:
        recipients:
          - anthonyalexis08@gmail.com
        notify:
          success: true
          failure: true
